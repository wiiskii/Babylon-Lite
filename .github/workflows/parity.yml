name: Parity

on:
  pull_request:
    branches: [master]

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install chromium

      - run: pnpm build:bundle-scenes

      - name: Run scene parity tests
        run: npx playwright test tests/parity/scenes/
        env:
          HEADLESS: "true"

      - name: Upload reference diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scene-parity-results
          path: |
            test-results/
            reference/**/test-actual.png
          retention-days: 7
