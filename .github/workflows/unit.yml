name: Unit

on:
  pull_request:
    branches: [master]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install chromium

      - run: pnpm build:bundle-scenes

      - name: Run vitest unit tests
        run: npx vitest run

      - name: Run dispose tests
        run: npx playwright test tests/plumbing/dispose.spec.ts
        env:
          HEADLESS: "true"

      - name: Run material-swap tests
        run: npx playwright test tests/plumbing/material-swap.spec.ts
        env:
          HEADLESS: "true"

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-results
          path: test-results/
          retention-days: 7
