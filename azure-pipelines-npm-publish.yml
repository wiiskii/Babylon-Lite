# Azure Pipelines — Babylon Lite npm Publish
#
# Publishes the built @babylonjs/lite package to npm. Configure NPM_TOKEN as
# a secret pipeline variable or variable-group value before enabling this run.
#
# Manual runs can choose patch, minor, major, or auto. Scheduled runs use auto.
# Pushes to master that change config/release.json read the release type from
# that file, so repeated patch releases can be requested by bumping its nonce.
#
# The same run also publishes @babylonjs/lite-compat under the `preview` dist-tag
# (never `latest`) with a unique `<base>-preview.<buildId>` version, so the
# compatibility layer is opt-in via `@babylonjs/lite-compat@preview` until it
# graduates to a stable release line.
#
# Set the `dryRun` parameter (manual run) to exercise the whole pipeline —
# build, test, version resolution, and package-content validation — without
# uploading to npm or pushing a release tag. In dry-run mode both `npm publish`
# calls use `--dry-run` and the git tag is created locally but not pushed.

trigger:
    branches:
        include:
            - master
    paths:
        include:
            - config/release.json

pr: none

schedules:
    - cron: "0 8 * * 1"
      displayName: "Weekly npm publish"
      branches:
          include:
              - master
      always: true

parameters:
    - name: releaseType
      displayName: "Release type"
      type: string
      default: minor
      values:
          - auto
          - patch
          - minor
          - major
    - name: dryRun
      displayName: "Dry run (validate + resolve versions, but do NOT publish or push tags)"
      type: boolean
      default: false

variables:
    - name: NODE_VERSION
      value: "22.x"
    - name: PNPM_VERSION
      value: "9.15.4"
    - name: CI
      value: "true"
    - name: HEADLESS
      value: "true"
    - name: DRY_RUN
      value: "${{ parameters.dryRun }}"

stages:
    - stage: PublishNpm
      displayName: "Publish @babylonjs/lite to npm"
      jobs:
          - job: BuildTestAndPublish
            displayName: "Build, Test, and Publish"
            pool:
                vmImage: "ubuntu-latest"
            steps:
                - checkout: self
                  fetchDepth: 0
                  fetchTags: true
                  persistCredentials: true

                - task: UseNode@1
                  inputs:
                      version: $(NODE_VERSION)

                - script: |
                      corepack enable
                      corepack prepare pnpm@$(PNPM_VERSION) --activate
                  displayName: "Enable pnpm via corepack"

                - script: pnpm install --frozen-lockfile
                  displayName: "Install dependencies"

                - script: pnpm run lint
                  displayName: "Lint and type-check"

                - script: pnpm test:unit
                  displayName: "Run unit tests"
                  env:
                      CI: "true"

                - script: pnpm test:build
                  displayName: "Run build-output tests"
                  env:
                      CI: "true"

                - script: pnpm build
                  displayName: "Build package"

                - script: npx tsx scripts/prepare-npm-release.ts
                  displayName: "Resolve npm package version"
                  env:
                      RELEASE_TYPE: ${{ parameters.releaseType }}
                      RELEASE_CONFIG_PATH: config/release.json

                - script: npm pack --dry-run ./packages/babylon-lite/dist
                  displayName: "Validate npm package contents"

                - script: |
                      set -euo pipefail

                      if [ -z "${NPM_TOKEN:-}" ]; then
                        echo "NPM_TOKEN must be configured as a secret pipeline variable."
                        exit 1
                      fi

                      printf "//registry.npmjs.org/:_authToken=%s\n" "$NPM_TOKEN" > ~/.npmrc

                      EXTRA=""
                      if [ "$(echo "${DRY_RUN:-false}" | tr '[:upper:]' '[:lower:]')" = "true" ]; then
                        echo "DRY RUN: npm publish will run with --dry-run (nothing is uploaded)."
                        EXTRA="--dry-run"
                      fi
                      npm publish ./packages/babylon-lite/dist $EXTRA --access public --registry https://registry.npmjs.org/
                  displayName: "Publish package to npm"
                  env:
                      NPM_TOKEN: $(NPM_TOKEN)

                - script: |
                      set -euo pipefail

                      TAG="npm-lite-v$(PACKAGE_VERSION)"
                      git config user.email "bjsplat@gmail.com"
                      git config user.name "Babylon.js CI"
                      git tag "$TAG" -m "Publish @babylonjs/lite $(PACKAGE_VERSION)"
                      if [ "$(echo "${DRY_RUN:-false}" | tr '[:upper:]' '[:lower:]')" = "true" ]; then
                        echo "DRY RUN: created tag $TAG locally but will NOT push it."
                      else
                        git push origin "refs/tags/$TAG"
                      fi
                  displayName: "Tag published npm version"

                # --- @babylonjs/lite-compat (preview dist-tag) ---------------------
                # The compatibility layer is published under the `preview` dist-tag
                # only (never `latest`), so `npm install @babylonjs/lite-compat`
                # resolves nothing until it graduates, while early adopters can opt in
                # with `@babylonjs/lite-compat@preview`. Each run stamps a unique
                # `<base>-preview.<buildId>` version and records the @babylonjs/lite
                # version it was built against.

                - script: pnpm --filter @babylonjs/lite-compat build
                  displayName: "Build @babylonjs/lite-compat"

                - script: npx tsx scripts/prepare-compat-preview-release.ts
                  displayName: "Resolve compat preview version"
                  env:
                      LITE_VERSION: $(PACKAGE_VERSION)

                - script: npm pack --dry-run ./packages/babylon-lite-compat/dist
                  displayName: "Validate compat package contents"

                - script: |
                      set -euo pipefail

                      if [ -z "${NPM_TOKEN:-}" ]; then
                        echo "NPM_TOKEN must be configured as a secret pipeline variable."
                        exit 1
                      fi

                      printf "//registry.npmjs.org/:_authToken=%s\n" "$NPM_TOKEN" > ~/.npmrc

                      EXTRA=""
                      if [ "$(echo "${DRY_RUN:-false}" | tr '[:upper:]' '[:lower:]')" = "true" ]; then
                        echo "DRY RUN: npm publish will run with --dry-run (nothing is uploaded)."
                        EXTRA="--dry-run"
                      fi
                      npm publish ./packages/babylon-lite-compat/dist $EXTRA --tag "$(PACKAGE_DIST_TAG_COMPAT)" --access public --registry https://registry.npmjs.org/
                  displayName: "Publish compat package to npm (preview)"
                  env:
                      NPM_TOKEN: $(NPM_TOKEN)
