# Azure Pipelines — Babylon Lite CI
#
# Runs on every PR targeting master. Seven parallel jobs:
#   1. Release Markers  — breaking-change marker validation
#   2. API Report       — public API diff comment + breaking-change validation
#   3. Unit Tests       — vitest + plumbing (Playwright)
#   4. Bundle Size      — ceiling checks
#   5. Perf Regression  — Lite vs Stable on BrowserStack
#   6. Parity (Cloud)   — pixel-diff via cloud browser with real WebGPU
#   7. Lint             — ESLint + TypeScript type-check
#

trigger: none

pr:
    branches:
        include:
            - master

variables:
    - group: BabylonJS-BrowserStack
    - group: BabylonJS-Deployment
    - name: NODE_VERSION
      value: "22.x"
    - name: PNPM_VERSION
      value: "9.15.4"
    - name: CI
      value: "true"
    - name: HEADLESS
      value: "true"

stages:
    - stage: CI
      displayName: "PR Validation"
      jobs:
          # ──────────────────────────────────────────────────────────────
          # Job 0: Release Marker Validation
          # ──────────────────────────────────────────────────────────────
          - job: ReleaseMarkers
            displayName: "Release Markers"
            pool:
                vmImage: "ubuntu-latest"
            steps:
                - checkout: self
                  fetchDepth: 0

                - task: UseNode@1
                  inputs:
                      version: $(NODE_VERSION)

                - script: |
                      corepack enable
                      corepack prepare pnpm@$(PNPM_VERSION) --activate
                  displayName: "Enable pnpm via corepack"

                - script: pnpm install --frozen-lockfile
                  displayName: "Install dependencies"

                - script: pnpm validate:release-markers
                  displayName: "Validate breaking-change markers"
                  env:
                      GITHUB_REPOSITORY: "BabylonJS/Babylon-Lite"
                      PR_NUMBER: "$(System.PullRequest.PullRequestNumber)"
                      GITHUB_TOKEN: "$(GITHUB_TOKEN)"

          # ──────────────────────────────────────────────────────────────
          # Job 1: API Report
          # ──────────────────────────────────────────────────────────────
          - job: ApiReport
            displayName: "API Report"
            pool:
                vmImage: "ubuntu-latest"
            steps:
                - checkout: self
                  fetchDepth: 0
                  persistCredentials: true

                - task: UseNode@1
                  inputs:
                      version: $(NODE_VERSION)

                - script: |
                      corepack enable
                      corepack prepare pnpm@$(PNPM_VERSION) --activate
                  displayName: "Enable pnpm via corepack"

                - script: pnpm install --frozen-lockfile
                  displayName: "Install dependencies"

                - script: pnpm report:api-changes
                  displayName: "Generate API report diff"
                  env:
                      GITHUB_REPOSITORY: "BabylonJS/Babylon-Lite"
                      PR_NUMBER: "$(System.PullRequest.PullRequestNumber)"
                      GITHUB_TOKEN: "$(GITHUB_TOKEN)"

                - task: GitHubComment@0
                  condition: and(always(), eq(variables['POST_API_COMMENT'], 'true'))
                  continueOnError: true
                  displayName: "Post API changes to PR"
                  inputs:
                      gitHubConnection: "BabylonBotPAT"
                      repositoryName: "$(Build.Repository.Name)"
                      id: "$(System.PullRequest.PullRequestNumber)"
                      comment: "$(API_COMMENT_BODY)"

          # ──────────────────────────────────────────────────────────────
          # Job 2: Unit Tests
          # ──────────────────────────────────────────────────────────────
          - job: UnitTests
            displayName: "Unit Tests"
            pool:
                vmImage: "ubuntu-latest"
            steps:
                - checkout: self

                - task: UseNode@1
                  inputs:
                      version: $(NODE_VERSION)

                - script: |
                      corepack enable
                      corepack prepare pnpm@$(PNPM_VERSION) --activate
                  displayName: "Enable pnpm via corepack"

                - script: pnpm install --frozen-lockfile
                  displayName: "Install dependencies"

                - script: pnpm exec playwright install chromium
                  displayName: "Install Playwright browsers"

                - script: npx vitest run --project unit
                  displayName: "Run vitest unit tests"
                  env:
                      CI: "true"

                - script: npx vitest run --project build
                  displayName: "Run vitest build-output tests"

                - script: |
                      npx playwright test tests/lite/plumbing/dispose.spec.ts
                      npx playwright test tests/lite/plumbing/material-swap.spec.ts
                      npx playwright test tests/lite/plumbing/memory-leak.spec.ts
                      npx playwright test tests/lite/plumbing/picking.spec.ts
                  displayName: "Run plumbing tests"
                  env:
                      HEADLESS: "true"

                - task: PublishTestResults@2
                  condition: always()
                  inputs:
                      testResultsFormat: "JUnit"
                      testResultsFiles: "**/test-results/unit-junit.xml"
                      mergeTestResults: true
                      testRunTitle: "Unit Tests"
                  continueOnError: true

                - script: npx tsx scripts/report-test-results.ts test-results/unit-junit.xml
                  condition: always()
                  continueOnError: true
                  displayName: "Report test results"

          # ──────────────────────────────────────────────────────────────
          # Job 3: Bundle Size
          # ──────────────────────────────────────────────────────────────
          - job: BundleSize
            displayName: "Bundle Size"
            pool:
                vmImage: "ubuntu-latest"
            steps:
                - checkout: self
                  persistCredentials: true

                - task: UseNode@1
                  inputs:
                      version: $(NODE_VERSION)

                - script: |
                      corepack enable
                      corepack prepare pnpm@$(PNPM_VERSION) --activate
                  displayName: "Enable pnpm via corepack"

                - script: pnpm install --frozen-lockfile
                  displayName: "Install dependencies"

                - script: pnpm exec playwright install chromium
                  displayName: "Install Playwright browsers"

                - script: |
                      TARGET_BRANCH="${SYSTEM_PULLREQUEST_TARGETBRANCH:-refs/heads/master}"
                      TARGET_BRANCH="${TARGET_BRANCH#refs/heads/}"
                      git fetch origin "$TARGET_BRANCH:refs/remotes/origin/$TARGET_BRANCH" --depth=1
                  displayName: "Fetch master bundle baseline"

                - script: pnpm build:bundle-scenes
                  displayName: "Build bundle scenes"
                  env:
                      SKIP_BJS: "true"

                # Absolute ceiling checks (scene-config.json maxRawKB)
                - script: npx playwright test tests/lite/parity/bundle-size.spec.ts --reporter=junit
                  displayName: "Bundle size ceiling checks"
                  env:
                      HEADLESS: "true"
                      PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-results/bundle-ceiling-junit.xml

                - script: npx tsx scripts/report-test-results.ts test-results/bundle-ceiling-junit.xml
                  condition: always()
                  displayName: "Report bundle-size results to Azure"

                - task: PublishTestResults@2
                  condition: always()
                  displayName: "Publish bundle-size test results"
                  inputs:
                      testResultsFormat: JUnit
                      testResultsFiles: "test-results/bundle-ceiling-junit.xml"
                      testRunTitle: "Bundle Size"

                # Generate bundle-size delta comment for PR
                - script: npx tsx scripts/report-bundle-size-deltas.ts
                  condition: always()
                  displayName: "Generate bundle-size delta comment"

                - task: GitHubComment@0
                  condition: and(always(), eq(variables['POST_BUNDLE_COMMENT'], 'true'))
                  continueOnError: true
                  displayName: "Post bundle-size changes to PR"
                  inputs:
                      gitHubConnection: "BabylonBotPAT"
                      repositoryName: "$(Build.Repository.Name)"
                      id: "$(System.PullRequest.PullRequestNumber)"
                      comment: "$(BUNDLE_COMMENT_BODY)"

                - script: pnpm build:lab-site
                  displayName: "Build static lab site"
                  env:
                      LAB_BASE_PATH: "/lite/$(Build.BuildNumber)/lab/"

                - template: config/templates/upload-static-site.yml
                  parameters:
                      siteDir: $(System.DefaultWorkingDirectory)/lab/dist
                      deployPath: lite/$(Build.BuildNumber)/lab
                      siteName: "Lab"

          # ──────────────────────────────────────────────────────────────
          # Job 4: Performance Regression
          # ──────────────────────────────────────────────────────────────
          - job: PerfRegression
            displayName: "Performance: Lite vs Stable"
            pool:
                vmImage: "ubuntu-latest"
            steps:
                - checkout: self
                  fetchDepth: 0
                  fetchTags: true

                - task: UseNode@1
                  inputs:
                      version: $(NODE_VERSION)

                - script: |
                      corepack enable
                      corepack prepare pnpm@$(PNPM_VERSION) --activate
                  displayName: "Enable pnpm via corepack"

                - script: pnpm install --frozen-lockfile
                  displayName: "Install dependencies"

                # Build current bundle scenes (skip size measurement — not needed for perf)
                - script: pnpm build:bundle-scenes
                  displayName: "Build current bundle scenes"
                  env:
                      SKIP_BJS: "true"
                      SKIP_MEASURE: "true"

                # Resolve baseline ref SHA for cache key.
                # Must mirror getBaselineRef() in scripts/build-perf-baseline.ts so the cache key
                # matches the ref that pnpm build:perf-baseline will actually build from.
                # NOTE: do NOT chain `git describe ... | xargs git rev-parse || fallback` — when
                # `git describe` finds no tag it exits non-zero but xargs still runs `git rev-parse`
                # with no args, which exits 0 with empty stdout, so the `||` fallbacks never fire
                # and BASELINE_SHA silently becomes empty. That corrupts the cache key to a
                # constant string shared across all builds.
                - script: |
                      set -u
                      TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)
                      if [ -n "$TAG" ]; then
                          BASELINE_SHA=$(git rev-parse "$TAG")
                          echo "Baseline ref: $TAG"
                      else
                          BASELINE_SHA=$(git rev-parse origin/master 2>/dev/null || git rev-parse HEAD~1)
                          echo "Baseline ref: origin/master (no v* tag found)"
                      fi
                      if [ -z "$BASELINE_SHA" ]; then
                          echo "##vso[task.logissue type=error]Failed to resolve baseline SHA — aborting to avoid poisoning the perf-baseline cache with an empty key."
                          exit 1
                      fi
                      echo "##vso[task.setvariable variable=BASELINE_SHA]$BASELINE_SHA"
                      echo "Baseline SHA: $BASELINE_SHA"
                      mkdir -p lab/public/bundle-baseline
                  displayName: "Resolve baseline ref"

                - task: Cache@2
                  inputs:
                      key: '"perf-baseline" | "$(BASELINE_SHA)"'
                      path: $(System.DefaultWorkingDirectory)/lab/public/bundle-baseline
                      cacheHitVar: BASELINE_CACHE_HIT
                  displayName: "Cache baseline bundles"

                # Build baseline bundle scenes from last release tag (or master)
                - script: pnpm build:perf-baseline
                  displayName: "Build baseline bundle scenes"
                  condition: ne(variables.BASELINE_CACHE_HIT, 'true')

                # Generate baseline HTML loader pages (needed even on cache hit)
                - script: |
                      node -e "
                      const fs = require('fs');
                      const path = require('path');
                      const scenes = JSON.parse(fs.readFileSync('scene-config.json','utf8'));
                      const outDir = path.join('lab','lite');
                      fs.mkdirSync(outDir, { recursive: true });
                      for (const s of scenes) {
                        const html = '<!DOCTYPE html><html><head><meta charset=\"UTF-8\"><style>html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000}canvas{width:100%;height:100%;display:block}</style></head><body><canvas id=\"renderCanvas\"></canvas><script src=\"/loader.js\"></script><script type=\"module\" src=\"/bundle-baseline/scene'+s.id+'.js\"></script></body></html>';
                        fs.writeFileSync(path.join(outDir,'bundle-baseline-scene'+s.id+'.html'), html);
                      }
                      console.log('Generated ' + scenes.length + ' baseline HTML pages');
                      "
                  displayName: "Generate baseline HTML pages"
                  condition: eq(variables.BASELINE_CACHE_HIT, 'true')

                # Runs current vs baseline on same BrowserStack macOS Chrome instance
                - script: pnpm test:perf-cloud
                  displayName: "Run perf regression tests (current vs stable)"
                  env:
                      HEADLESS: "true"
                      PERF_REGRESSION_PCT: "$(PERF_REGRESSION_PCT)"
                      PERF_FRAMES: "$(PERF_FRAMES)"
                      PERF_RUNS: "$(PERF_RUNS)"
                      PERF_WARMUP: "$(PERF_WARMUP)"
                      BROWSERSTACK_USERNAME: "$(BROWSERSTACK_USERNAME)"
                      BROWSERSTACK_ACCESS_KEY: "$(BROWSERSTACK_ACCESS_KEY)"

                - task: PublishTestResults@2
                  condition: always()
                  inputs:
                      testResultsFormat: "JUnit"
                      testResultsFiles: "**/test-results/perf-junit.xml"
                      mergeTestResults: true
                      testRunTitle: "Perf Regression"
                  continueOnError: true

                - script: npx tsx scripts/report-test-results.ts test-results/perf-junit.xml
                  condition: always()
                  continueOnError: true
                  displayName: "Report test results"

                - template: config/templates/upload-test-report.yml
                  parameters:
                      reportDir: $(System.DefaultWorkingDirectory)/test-results/perf-report
                      reportType: perf

          # ──────────────────────────────────────────────────────────────
          # Job 5: Parity (Cloud Browser)
          # ──────────────────────────────────────────────────────────────
          - job: ParityCloud
            displayName: "Parity Tests (Cloud Browser)"
            timeoutInMinutes: 120
            pool:
                vmImage: "ubuntu-latest"
            steps:
                - checkout: self

                - task: UseNode@1
                  inputs:
                      version: $(NODE_VERSION)

                - script: |
                      corepack enable
                      corepack prepare pnpm@$(PNPM_VERSION) --activate
                  displayName: "Enable pnpm via corepack"

                - script: pnpm install --frozen-lockfile
                  displayName: "Install dependencies"

                - script: pnpm build:bundle-scenes
                  displayName: "Build bundle scenes"
                  env:
                      SKIP_BJS: "true"
                      SKIP_MEASURE: "true"

                # Run parity tests via BrowserStack (macOS Chrome with real WebGPU)
                # browserstack-node-sdk handles connection & local tunnel
                # Requires BROWSERSTACK_USERNAME and BROWSERSTACK_ACCESS_KEY
                # from the BabylonJS-BrowserStack variable group
                - script: pnpm test:parity-cloud
                  displayName: "Run parity tests (BrowserStack)"
                  env:
                      HEADLESS: "true"
                      BROWSERSTACK_USERNAME: "$(BROWSERSTACK_USERNAME)"
                      BROWSERSTACK_ACCESS_KEY: "$(BROWSERSTACK_ACCESS_KEY)"

                - task: PublishTestResults@2
                  condition: always()
                  inputs:
                      testResultsFormat: "JUnit"
                      testResultsFiles: "**/test-results/parity-junit.xml"
                      mergeTestResults: true
                      testRunTitle: "Parity (Cloud)"
                  continueOnError: true

                - script: npx tsx scripts/report-test-results.ts test-results/parity-junit.xml
                  condition: always()
                  continueOnError: true
                  displayName: "Report test results"

                - template: config/templates/upload-test-report.yml
                  parameters:
                      reportDir: $(System.DefaultWorkingDirectory)/test-results/parity-report
                      reportType: parity

          # ──────────────────────────────────────────────────────────────
          # Job 6: Lint
          # ──────────────────────────────────────────────────────────────
          - job: Lint
            displayName: "Lint & Type Check"
            pool:
                vmImage: "ubuntu-latest"
            steps:
                - checkout: self

                - task: UseNode@1
                  inputs:
                      version: $(NODE_VERSION)

                - script: |
                      corepack enable
                      corepack prepare pnpm@$(PNPM_VERSION) --activate
                  displayName: "Enable pnpm via corepack"

                - script: pnpm install --frozen-lockfile
                  displayName: "Install dependencies"

                - script: npx eslint . --format ./scripts/eslint-vso-formatter.cjs
                  displayName: "ESLint"

                - script: |
                      npx tsc -p packages/babylon-lite/tsconfig.json --noEmit 2>&1 | sed -E 's/^(.+)\(([0-9]+),([0-9]+)\): error (TS[0-9]+): (.+)/##vso[task.logissue type=error;sourcepath=\1;linenumber=\2;columnnumber=\3]\4: \5/'
                  displayName: "TypeScript type-check (package)"

                - script: |
                      npx tsc -p lab/tsconfig.typecheck.json --noEmit 2>&1 | sed -E 's/^(.+)\(([0-9]+),([0-9]+)\): error (TS[0-9]+): (.+)/##vso[task.logissue type=error;sourcepath=\1;linenumber=\2;columnnumber=\3]\4: \5/'
                  displayName: "TypeScript type-check (lab)"

                - script: |
                      npx tsc -p tests/lite/tsconfig.json --noEmit 2>&1 | sed -E 's/^(.+)\(([0-9]+),([0-9]+)\): error (TS[0-9]+): (.+)/##vso[task.logissue type=error;sourcepath=\1;linenumber=\2;columnnumber=\3]\4: \5/'
                  displayName: "TypeScript type-check (tests)"

          # ──────────────────────────────────────────────────────────────
          # Job 7: Compat Layer (@babylonjs/lite-compat)
          # ──────────────────────────────────────────────────────────────
          # Type-checks, builds, and unit-tests the opt-in compatibility layer so
          # regressions are caught in PR CI. NOTE: this job intentionally does NOT
          # publish the package — @babylonjs/lite-compat is not released yet. The
          # npm-publish pipeline only publishes packages/babylon-lite/dist.
          - job: Compat
            displayName: "Compat Layer"
            pool:
                vmImage: "ubuntu-latest"
            steps:
                - checkout: self

                - task: UseNode@1
                  inputs:
                      version: $(NODE_VERSION)

                - script: |
                      corepack enable
                      corepack prepare pnpm@$(PNPM_VERSION) --activate
                  displayName: "Enable pnpm via corepack"

                - script: pnpm install --frozen-lockfile
                  displayName: "Install dependencies"

                - script: |
                      npx tsc -p packages/babylon-lite-compat/tsconfig.json --noEmit 2>&1 | sed -E 's/^(.+)\(([0-9]+),([0-9]+)\): error (TS[0-9]+): (.+)/##vso[task.logissue type=error;sourcepath=\1;linenumber=\2;columnnumber=\3]\4: \5/'
                  displayName: "TypeScript type-check (compat src)"

                - script: |
                      npx tsc -p packages/babylon-lite-compat/tests/tsconfig.json --noEmit 2>&1 | sed -E 's/^(.+)\(([0-9]+),([0-9]+)\): error (TS[0-9]+): (.+)/##vso[task.logissue type=error;sourcepath=\1;linenumber=\2;columnnumber=\3]\4: \5/'
                  displayName: "TypeScript type-check (compat tests)"

                - script: pnpm --filter @babylonjs/lite-compat build
                  displayName: "Build compat package (dist)"

                - script: npx vitest run --project compat
                  displayName: "Run compat unit tests"
                  env:
                      CI: "true"

                - task: PublishTestResults@2
                  condition: always()
                  inputs:
                      testResultsFormat: "JUnit"
                      testResultsFiles: "**/test-results/unit-junit.xml"
                      mergeTestResults: true
                      testRunTitle: "Compat Layer"
                  continueOnError: true
