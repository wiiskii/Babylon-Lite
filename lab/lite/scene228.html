<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Babylon Lite — Scene 228: Multi-Canvas (Different Scenes)</title>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #000;
                color: #ddd;
                font-family: -apple-system, sans-serif;
            }
            .wrap {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 4px;
                width: 100%;
                height: 100%;
                background: #222;
            }
            .pane {
                position: relative;
                background: #000;
                overflow: hidden;
            }
            .pane canvas {
                width: 100%;
                height: 100%;
                display: block;
            }
            .label {
                position: absolute;
                top: 8px;
                left: 10px;
                font-size: 12px;
                padding: 2px 6px;
                background: rgba(0, 0, 0, 0.55);
                border-radius: 3px;
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <div class="pane">
                <canvas id="renderCanvas"></canvas>
                <div class="label">Canvas A — spheres</div>
            </div>
            <div class="pane">
                <canvas id="canvasB"></canvas>
                <div class="label">Canvas B — torus knot</div>
            </div>
        </div>
        <script src="/loader.js"></script>
        <script type="module" src="/lite/src/lite/scene228.ts"></script>
    </body>
</html>
